version: 2
updates:
  # npm dependencies — keep runtime + dev deps current. Exact-version pins in
  # package.json are bumped via PRs so the lockfile stays reproducible.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: chore
      include: scope

  # CI-only Jazzer.js fuzzing driver — a standalone npm project kept out of the
  # root pnpm tree (see .github/workflows/cflite-pr.yml). Its lockfile is what
  # hash-pins the fuzzer for `npm ci`, so Dependabot must refresh it here too.
  - package-ecosystem: npm
    directory: "/.clusterfuzzlite/jazzer"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: ci
      include: scope

  # GitHub Actions — Dependabot bumps the SHA pin and refreshes the trailing
  # version comment, so actions stay pinned-by-hash while still being updated.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      # `codeql-action/init` and `codeql-action/analyze` MUST move together:
      # the analyze post-action aborts with "Loaded a configuration file for
      # version 'X', but running version 'Y'" when the two steps resolve to
      # different releases. Ungrouped, Dependabot opened one PR per sub-action
      # (#298, #299) and neither could ever go green on its own.
      codeql-action:
        patterns:
          - "github/codeql-action*"

# .github/workflows/release.yml
# Release pipeline for `@odere-pro/agentline`.
#
# Triggers on pushes of annotated `v*` tags. The job:
#   1. Refuses to publish unless the tag (`vX.Y.Z`) matches
#      `package.json#version` (spec §12.2 — tag ↔ package version).
#   2. Re-runs the full local quality bar: `pnpm install --frozen-lockfile`,
#      build, lint, typecheck, tests, and `tests/gates/run-all.sh`. A
#      failure aborts before any publish.
#   3. Packs the canonical tarball, computes `SHA256SUMS`, and cosign-signs
#      both with keyless Sigstore (a `.sig` + `.pem` per artifact).
#   4. Generates a SLSA build-provenance attestation for the tarball and
#      stages it as `<tarball>.intoto.jsonl` (OpenSSF Scorecard's
#      Signed-Releases check credits a `.intoto.jsonl` asset as provenance,
#      lifting cosign's signature score from 8 to 10).
#   5. `pnpm publish --provenance`. OIDC-based provenance attestation is
#      issued by GitHub to npm; no manual key handling.
#   6. Creates a GitHub Release whose body is the matching `[X.Y.Z]`
#      block extracted from `CHANGELOG.md`, and attaches the tarball,
#      `SHA256SUMS`, their cosign `.sig`/`.pem` signatures, and the
#      `.intoto.jsonl` provenance as assets.
#
# Hard invariants (per spec §11.1):
#   - SHA-pinned actions.
#   - Repo-default `permissions: read-all`; the job re-grants the three
#     write scopes it actually needs (`contents` for the GitHub Release,
#     `id-token` for npm provenance OIDC and cosign keyless signing, and
#     `attestations` for the SLSA build-provenance attestation).
#   - Concurrency keyed to the tag so a re-pushed tag cancels stale runs.
#   - All shell steps use `bash` explicitly.
#
# Required repository secret: `NPM_TOKEN` (npm Automation or granular
# token with publish rights for `@odere-pro/agentline`). The token is consumed
# only by the publish step; provenance still requires the workflow to
# run on the public GitHub-hosted runners.

name: release

on:
  push:
    tags: ["v*"]

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish ${{ github.ref_name }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json#version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="$(node -p "require('./package.json').version")"
          expected="v${version}"
          if [ "${tag}" != "${expected}" ]; then
            echo "::error::tag '${tag}' does not match package.json version '${version}' (expected '${expected}')"
            exit 1
          fi
          echo "tag matches package.json version: ${tag}"

      - name: Install dependencies (pnpm)
        # corepack ships with Node ≥20 and pins pnpm via package.json's
        # `packageManager`. The shim persists across job steps, so the
        # `pnpm publish` step's `prepublishOnly` (pnpm run build) still works.
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Run gates
        run: bash tests/gates/run-all.sh

      - name: Pack tarball
        id: pack
        run: |
          mkdir -p .release
          # `pnpm pack` has no `--json`; the freshly-created .release/ holds
          # exactly one .tgz, so glob it rather than parse stdout.
          pnpm pack --pack-destination=.release
          tarball="$(cd .release && ls -1 *.tgz | head -1)"
          if [ -z "${tarball}" ] || [ ! -f ".release/${tarball}" ]; then
            echo "::error::pnpm pack did not produce a tarball"
            exit 1
          fi
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "tarball_path=.release/${tarball}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256SUMS
        id: sums
        run: |
          cd .release
          # `shasum -a 256 <file>` is portable across the Linux runner image.
          shasum -a 256 "${{ steps.pack.outputs.tarball }}" > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign binary. Without this the installer floats to the
          # latest release; cosign 3.x defaults to --new-bundle-format, which
          # ignores the --output-signature/--output-certificate flags the sign
          # step below relies on to emit the .sig/.pem assets. v2.6.1 is the
          # toolchain that signed v0.1.4.
          cosign-release: v2.6.1

      - name: Sign release artifacts (cosign keyless)
        # Keyless Sigstore signing via the job's OIDC token (id-token: write):
        # Fulcio issues a short-lived cert, the signature is logged in Rekor,
        # no long-lived key is handled. Emit a .sig + .pem per artifact so
        # OpenSSF Scorecard's Signed-Releases check recognises the GitHub
        # release assets as signed.
        working-directory: .release
        run: |
          for f in "${{ steps.pack.outputs.tarball }}" SHA256SUMS; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done
          ls -1

      - name: Attest build provenance (SLSA)
        id: provenance
        # Keyless Sigstore attestation over the packed tarball, recorded in the
        # GitHub attestations store (verifiable with `gh attestation verify`).
        # Uses the job's id-token + attestations write scopes; no stored key.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.tarball_path }}

      - name: Stage provenance as a release asset
        # Copy the attestation bundle next to the tarball with the
        # `.intoto.jsonl` name OpenSSF Scorecard's Signed-Releases check
        # recognises as provenance (taking cosign's 8 up to 10).
        run: |
          cp "${{ steps.provenance.outputs.bundle-path }}" \
            ".release/${{ steps.pack.outputs.tarball }}.intoto.jsonl"
          ls -1 .release

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          version="$(node -p "require('./package.json').version")"
          notes_file=".release/RELEASE_NOTES.md"
          # Pull the lines between `## [<version>]` and the next `## [`.
          awk -v ver="[${version}]" '
            $0 ~ "^## \\[" {
              if (in_block) { exit }
              if (index($0, ver) > 0) { in_block = 1; next }
            }
            in_block { print }
          ' CHANGELOG.md > "${notes_file}"
          if [ ! -s "${notes_file}" ]; then
            echo "::error::no [${version}] block found in CHANGELOG.md"
            exit 1
          fi
          echo "notes_path=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --no-git-checks: the job runs from a detached tag ref, which pnpm's
        # clean-branch guard would otherwise reject.
        run: pnpm publish --provenance --access public --no-git-checks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            ${{ steps.pack.outputs.tarball_path }}
            .release/SHA256SUMS
            .release/${{ steps.pack.outputs.tarball }}.sig
            .release/${{ steps.pack.outputs.tarball }}.pem
            .release/SHA256SUMS.sig
            .release/SHA256SUMS.pem
            .release/${{ steps.pack.outputs.tarball }}.intoto.jsonl
          fail_on_unmatched_files: true
          make_latest: true

      - name: Upload failure artefacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.ref_name }}
          path: |
            .release/*.tgz
            .release/SHA256SUMS
            .release/RELEASE_NOTES.md
            tests/gates/.tmp
          if-no-files-found: ignore
          retention-days: 14

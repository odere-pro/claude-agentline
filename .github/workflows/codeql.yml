# .github/workflows/codeql.yml
# CodeQL static analysis (SAST) for the TypeScript sources. Implements the
# scanning half of cookbook 17 I-11's intent (catch code-level issues, not
# just advisories) and feeds the GitHub code-scanning dashboard.
#
# Hard invariants (Implementation Plan 3):
# - Actions pinned by full commit SHA (not by tag/branch).
# - `permissions: read-all` at the workflow level; the job widens only to
#   `security-events: write` (upload SARIF) + `actions: read`.
# - PR-only concurrency cancellation; main pushes run to completion.
# - JS/TS needs no build — `build-mode: none` keeps extraction hermetic.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 07:00 UTC — ahead of the broader Monday queue.
    - cron: "0 7 * * 1"

permissions: read-all

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:javascript-typescript"

# .github/workflows/install-matrix.yml
# Smoke-runs the published tarball + `scripts/install.sh && scripts/uninstall.sh`
# on every supported host × Node combination. Each cell:
#   1. builds dist/cli.mjs
#   2. packs the repo with `npm pack` (the artefact users would receive)
#   3. installs that tarball into an isolated `--prefix` so the host's
#      global node_modules tree is never touched
#   4. pipes a canonical Claude Code statusline payload through the
#      installed bin and asserts the expected stdout (gate 15)
#   5. runs the install/uninstall roundtrip from the working tree against
#      a temp HOME / CLAUDE_CONFIG_DIR (gates 07, 09, 10)
# Spec: §1.2 N1, §11.1, §11.2 G15
#
# Hard invariants: SHA-pinned actions, `permissions: read-all`,
# PR-only concurrency cancellation (main pushes run to completion so
# the badge reflects every commit), `bash` everywhere (incl. Windows).

name: install-matrix

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

concurrency:
  group: install-matrix-${{ github.workflow }}-${{ github.ref }}
  # Only cancel in-progress runs for PR updates (force-push during review).
  # Main-branch pushes must run to completion — otherwise the README badge
  # stays stuck on whatever the last *uncancelled* run reported.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  roundtrip:
    name: roundtrip / ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Matrix kept intentionally small: agentline ships pure JavaScript
        # with no native modules. macos-13 (Intel) is omitted because GitHub
        # is winding down its Intel-mac pool; ubuntu-22.04 is omitted because
        # 24.04 is the current LTS and the bash/coreutils skew between them
        # has not produced a real bug for this codebase. Re-add either if a
        # native dependency lands or a bash-skew regression appears.
        os: [macos-14, ubuntu-24.04, windows-2022]
        node: [20, 22]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies (pnpm)
        # Dev/build deps only. The tarball pack + global install below
        # deliberately stay on npm — they simulate the consumer receiving
        # the published artefact (npm is the dominant consumer PM).
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build agentline bin
        run: pnpm run build

      - name: Pack tarball
        id: pack
        run: |
          mkdir -p .ci-pack
          tarball="$(npm pack --pack-destination=.ci-pack --json \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{const a=JSON.parse(d);process.stdout.write(a[0].filename)})')"
          if [ -z "${tarball}" ] || [ ! -f ".ci-pack/${tarball}" ]; then
            echo "::error::npm pack did not produce a tarball"
            exit 1
          fi
          echo "tarball=$(pwd)/.ci-pack/${tarball}" >> "$GITHUB_OUTPUT"

      - name: Install tarball into isolated prefix
        id: prefix
        run: |
          prefix="$(pwd)/.ci-prefix"
          mkdir -p "${prefix}"
          # Scorecard pin exemption: this installs a hash-stable tarball produced
          # by `npm pack` earlier in the same job — equivalent to a pinned local
          # file install, with no network version resolution.
          npm install --global --prefix="${prefix}" --no-audit --no-fund "${{ steps.pack.outputs.tarball }}"
          # POSIX hosts → <prefix>/bin/agentline; Windows runners → <prefix>/agentline.cmd.
          for cand in "${prefix}/bin/agentline" "${prefix}/agentline" "${prefix}/bin/agentline.cmd" "${prefix}/agentline.cmd"; do
            if [ -e "${cand}" ]; then
              echo "bin=${cand}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "::error::agentline bin not found under ${prefix}"
          find "${prefix}" -maxdepth 3 || true
          exit 1

      - name: Render smoke (gate 15)
        env:
          # Isolate config so the live render falls back to
          # `DEFAULT_CONFIG` (model-only) instead of reading any
          # `~/.config/agentline/config.json` left on the runner.
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/agentline-smoke-cfg
        run: |
          mkdir -p "$CLAUDE_CONFIG_DIR"
          # `gate-15` is not a known model id, so the `model` widget
          # falls back to the raw id. The rest of the default config
          # widgets hide (no transcript, no git repo, etc.), so the
          # rendered line is just the model widget — which carries its
          # `session` family glyph (U+2302) per the family-identity
          # contract. ASCII fallback engages only with NO_UNICODE=1.
          expected=$'⌂ gate-15'
          actual="$(printf '%s' '{"model":"gate-15","cwd":"/agentline/gate-15"}' | NO_COLOR=1 "${{ steps.prefix.outputs.bin }}")"
          # Trim a single trailing newline so the byte-comparison is shell-agnostic.
          actual="${actual%$'\n'}"
          if [ "${actual}" != "${expected}" ]; then
            printf 'expected: %q\nactual:   %q\n' "${expected}" "${actual}"
            exit 1
          fi
          echo "render smoke matched expected bytes"

      - name: Install (dry-run preview)
        env:
          HOME: ${{ runner.temp }}/agentline-home
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/agentline-cfg
        run: |
          mkdir -p "$HOME" "$CLAUDE_CONFIG_DIR"
          # Drop a no-op `agentline` shim onto PATH so install.sh skips
          # `npm install -g` (we already proved the tarball works above).
          # A plain bash script with no extension works under Git Bash on
          # Windows too — `command -v agentline` resolves it identically
          # to POSIX hosts, while `.cmd` would be invisible to the lookup.
          shim_dir="$(pwd)/.ci-shim"
          mkdir -p "${shim_dir}"
          printf '#!/usr/bin/env bash\nexit 0\n' > "${shim_dir}/agentline"
          chmod +x "${shim_dir}/agentline"
          export PATH="${shim_dir}:$PATH"
          bash scripts/install.sh --dry-run

      - name: Install (real)
        env:
          HOME: ${{ runner.temp }}/agentline-home
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/agentline-cfg
        run: |
          shim_dir="$(pwd)/.ci-shim"
          export PATH="${shim_dir}:$PATH"
          bash scripts/install.sh

      - name: Uninstall
        env:
          HOME: ${{ runner.temp }}/agentline-home
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/agentline-cfg
        run: |
          shim_dir="$(pwd)/.ci-shim"
          export PATH="${shim_dir}:$PATH"
          bash scripts/uninstall.sh

      - name: Verify clean working tree
        run: |
          # The install/uninstall roundtrip writes only into the temp HOME +
          # CLAUDE_CONFIG_DIR overrides above; the repo working tree must be
          # untouched. Ignore the .ci-* scratch dirs added by earlier steps.
          if ! git diff --quiet --exit-code -- ':!.ci-pack' ':!.ci-prefix' ':!.ci-shim'; then
            echo "::error::working tree changed after install + uninstall"
            git --no-pager diff -- ':!.ci-pack' ':!.ci-prefix' ':!.ci-shim'
            exit 1
          fi

      - name: Upload failure artefacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: install-matrix-${{ matrix.os }}-node${{ matrix.node }}
          path: |
            .ci-pack/*.tgz
            tests/gates/.tmp
          if-no-files-found: ignore
          retention-days: 7

# .github/workflows/scorecard.yml
# OpenSSF Scorecard — continuously grades this repo's supply-chain
# posture (branch protection, pinned deps, token permissions, SAST, …)
# and publishes the result to the GitHub code-scanning dashboard.
#
# Hard invariants (Implementation Plan 3):
# - Actions pinned by full commit SHA.
# - `permissions: read-all` at the workflow level; the job widens only to
#   `security-events: write` (SARIF upload) + `id-token: write`
#   (publish_results attestation) + `contents: read`.
# - `branch_protection_rule` + scheduled + main-push + manual-dispatch
#   triggers (manual dispatch lets a maintainer re-grade on demand after a
#   settings change — see docs/SECURITY-CHECKLIST.md).

name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: results.sarif

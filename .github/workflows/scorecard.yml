# .github/workflows/scorecard.yml
# OpenSSF Scorecard — continuously grades this repo's supply-chain
# posture (branch protection, pinned deps, token permissions, SAST, …)
# and publishes the score to the public OpenSSF API that backs the README
# badge (https://scorecard.dev/viewer/?uri=github.com/odere-pro/claude-agentline).
#
# The SARIF result is NOT imported into GitHub code scanning: several checks
# (Code-Review, Branch-Protection review tiers) are structurally unsatisfiable
# for a solo maintainer, so mirroring them into the Security tab only produces
# un-actionable alerts. See docs/SECURITY-CHECKLIST.md for the rationale.
#
# Hard invariants (Implementation Plan 3):
# - Actions pinned by full commit SHA.
# - `permissions: read-all` at the workflow level; the job widens only to
#   `id-token: write` (publish_results attestation) + `contents: read`.
# - `branch_protection_rule` + scheduled + main-push + manual-dispatch
#   triggers (manual dispatch lets a maintainer re-grade on demand after a
#   settings change — see docs/SECURITY-CHECKLIST.md).

name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

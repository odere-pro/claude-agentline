# .github/workflows/secret-scan.yml
# Implements the cookbook 17 "Secret handling" control: a secret scanner
# with custom per-service regexes runs on every push and pull request.
# Findings fail the check; the diff never reaches a release.
#
# Hard invariants (Implementation Plan 3):
# - Trigger is `push` + `pull_request` (NOT `pull_request_target`).
# - `permissions: read-all` at the workflow level; the job needs only
#   `contents: read`.
# - Action pinned by full commit SHA.
# - Full history (`fetch-depth: 0`) so historical commits are scanned.
#
# NOTE (manual follow-up): gitleaks-action is free for personal/public
# repos; GitHub *organisations* must set a `GITLEAKS_LICENSE` repo secret
# (https://gitleaks.io). Until then, GitHub-native secret scanning + push
# protection (a repo setting) is the primary control.

name: secret-scan

on:
  push:
  pull_request:

permissions: read-all

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # Required since gitleaks-action v2 to scan pull_request events
          # ("GITHUB_TOKEN is now required to scan pull requests").
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

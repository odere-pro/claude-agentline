# .github/workflows/pricing-skew.yml
# Scheduled comparison of the embedded pricing table against (a) the
# §9.2 D06 staleness budget and (b) an optional external reference URL.
# The cost widget reads from `src/tokens/pricing.ts`; this workflow
# exists so the table never quietly drifts past 90 days.
#
# Spec: §8.5, §11.1
#
# Hard invariants (Implementation Plan 3):
# - Actions pinned by full commit SHA.
# - `permissions: read-all` at the workflow level. The job surfaces skew
#   via a non-zero exit + step summary; it does not push commits, open
#   issues, or require any write-scoped token.
# - `concurrency:` cancellation set so a manual dispatch supersedes a
#   scheduled run mid-flight rather than queueing duplicates.
# - Bash everywhere.
# - Machine-readable artefacts uploaded on every run (success and
#   failure) so reviewers can inspect the parsed snapshot without
#   re-running the workflow.

name: pricing-skew

on:
  schedule:
    # First day of every month at 09:00 UTC. A missed monthly run still
    # surfaces well within the 90-day D06 budget enforced below.
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      reference_url:
        description: "URL of a JSON file mapping <modelId> -> { input, output, cached } (USD per million tokens). Leave blank to skip the diff and only enforce staleness."
        required: false
        default: ""
      stale_days:
        description: "Days after which PRICING_TABLE_VERSION is considered skewed."
        required: false
        default: "90"

permissions: read-all

concurrency:
  group: pricing-skew-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  skew:
    name: pricing skew
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Extract pricing table snapshot
        id: snapshot
        env:
          PRICING_FILE: src/tokens/pricing.ts
        run: |
          set -Eeuo pipefail
          mkdir -p .ci-pricing
          # Parse `PRICING_TABLE_VERSION = "YYYY-MM-DD"` and the row set
          # in the embedded `Map` literal. Regex parsing keeps this
          # workflow self-contained: no `tsc` or `tsup` round-trip just
          # to read two values out of a static module.
          node -e '
            const fs = require("fs");
            const path = process.env.PRICING_FILE;
            const src = fs.readFileSync(path, "utf8");
            const versionMatch = src.match(/PRICING_TABLE_VERSION\s*=\s*"(\d{4}-\d{2}-\d{2})"/);
            if (!versionMatch) {
              process.stderr.write("PRICING_TABLE_VERSION literal not found in " + path + "\n");
              process.exit(1);
            }
            const version = versionMatch[1];
            const rowRe = /\[\s*"([^"]+)"\s*,\s*\{\s*input:\s*([0-9.]+)\s*,\s*output:\s*([0-9.]+)\s*,\s*cached:\s*([0-9.]+)\s*\}\s*\]/g;
            const rows = {};
            let m;
            while ((m = rowRe.exec(src))) {
              rows[m[1]] = { input: Number(m[2]), output: Number(m[3]), cached: Number(m[4]) };
            }
            if (Object.keys(rows).length === 0) {
              process.stderr.write("no priced models parsed from " + path + "\n");
              process.exit(1);
            }
            const snapshot = { version, models: rows };
            fs.writeFileSync(".ci-pricing/embedded.json", JSON.stringify(snapshot, null, 2) + "\n");
            console.log("version=" + version);
            console.log("models=" + Object.keys(rows).length);
          '
          version="$(node -e 'process.stdout.write(require("./.ci-pricing/embedded.json").version)')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Enforce staleness budget
        env:
          STALE_DAYS_INPUT: ${{ github.event.inputs.stale_days }}
        run: |
          set -Eeuo pipefail
          stale_days="${STALE_DAYS_INPUT:-}"
          if [ -z "${stale_days}" ]; then
            stale_days="90"
          fi
          export STALE_DAYS="${stale_days}"
          node -e '
            const fs = require("fs");
            const snap = JSON.parse(fs.readFileSync(".ci-pricing/embedded.json", "utf8"));
            const ts = Date.parse(snap.version + "T00:00:00Z");
            if (!Number.isFinite(ts)) {
              process.stderr.write("invalid PRICING_TABLE_VERSION: " + snap.version + "\n");
              process.exit(1);
            }
            const ageDays = Math.floor((Date.now() - ts) / 86400000);
            const threshold = Number(process.env.STALE_DAYS);
            const summary = process.env.GITHUB_STEP_SUMMARY;
            const lines = [
              "## Pricing table staleness",
              "",
              "| Field | Value |",
              "| --- | --- |",
              "| Version | `" + snap.version + "` |",
              "| Age (days) | " + ageDays + " |",
              "| Threshold (days) | " + threshold + " |",
              "| Models | " + Object.keys(snap.models).length + " |",
              "",
            ];
            if (summary) fs.appendFileSync(summary, lines.join("\n") + "\n");
            console.log("PRICING_TABLE_VERSION=" + snap.version + " age=" + ageDays + "d threshold=" + threshold + "d");
            if (ageDays > threshold) {
              console.log("::error::pricing table is stale: " + ageDays + " > " + threshold + " days; refresh src/tokens/pricing.ts");
              process.exit(1);
            }
          '

      - name: Compare to reference (optional)
        if: ${{ github.event.inputs.reference_url != '' }}
        env:
          REFERENCE_URL: ${{ github.event.inputs.reference_url }}
        run: |
          set -Eeuo pipefail
          # `--max-time 30` keeps a slow upstream from blocking the run;
          # `--fail` turns 4xx/5xx into a non-zero exit so we never
          # parse an HTML error body as JSON.
          curl --fail --silent --show-error --location --max-time 30 \
            --output .ci-pricing/reference.json "${REFERENCE_URL}"
          node -e '
            const fs = require("fs");
            const snap = JSON.parse(fs.readFileSync(".ci-pricing/embedded.json", "utf8"));
            const reference = JSON.parse(fs.readFileSync(".ci-pricing/reference.json", "utf8"));
            const fields = ["input", "output", "cached"];
            const skew = [];
            for (const id of Object.keys(reference)) {
              const ours = snap.models[id];
              if (!ours) {
                skew.push("missing: " + id + " not in embedded table");
                continue;
              }
              for (const f of fields) {
                if (Number(ours[f]) !== Number(reference[id][f])) {
                  skew.push(id + "." + f + ": embedded=" + ours[f] + " reference=" + reference[id][f]);
                }
              }
            }
            for (const id of Object.keys(snap.models)) {
              if (!reference[id]) {
                skew.push("extra: " + id + " not in reference");
              }
            }
            const summary = process.env.GITHUB_STEP_SUMMARY;
            if (skew.length === 0) {
              console.log("pricing tables match");
              if (summary) fs.appendFileSync(summary, "Reference comparison: **match**\n");
              process.exit(0);
            }
            for (const line of skew) console.log("- " + line);
            fs.writeFileSync(".ci-pricing/skew.txt", skew.join("\n") + "\n");
            if (summary) {
              const block = ["## Reference comparison", "", "```text", ...skew, "```", ""].join("\n");
              fs.appendFileSync(summary, block + "\n");
            }
            process.exit(1);
          '

      - name: Upload pricing snapshot
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pricing-skew-${{ github.run_id }}
          path: .ci-pricing/
          if-no-files-found: warn
          retention-days: 30

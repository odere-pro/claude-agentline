# .github/workflows/pages.yml
# Publishes the standalone landing page in `site/` to GitHub Pages.
# The page is an indexable marketing/SEO surface, kept isolated from the
# Markdown docs so GitHub's Jekyll pipeline never processes `docs/*.md`.
#
# Hard invariants (mirrors the repo's other workflows):
# - Actions pinned by full commit SHA (not by tag/branch).
# - Least-privilege: `permissions: {}` at the workflow level; each job
#   widens only to what it needs (Pages deploy needs `pages: write` +
#   `id-token: write`).
# - Triggered by changes to the self-contained `site/` tree or this
#   workflow — plus manual dispatch for on-demand republish.
# - `site/` is NOT in the npm `files` allowlist, so it never ships in the
#   published tarball.

name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

# .github/workflows/gates.yml
# Runs `tests/gates/run-all.sh` on every supported host × Node combination.
# Spec: §11.1
#
# Hard invariants (Implementation Plan 3):
# - Actions pinned by full commit SHA (not by tag/branch).
# - `permissions: read-all` at the workflow level; widened per-job only
#   when needed.
# - `concurrency:` cancels stale PR runs only; main-branch pushes run
#   to completion so the badge reflects every commit's status.
# - `fail-fast: false` so one host's failure does not mask another's.
# - Windows runs use Git Bash (`shell: bash`).
# - Machine-readable artefacts uploaded on failure.

name: gates

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

concurrency:
  group: gates-${{ github.workflow }}-${{ github.ref }}
  # Only cancel in-progress runs for PR updates (force-push during review).
  # Main-branch pushes must run to completion — otherwise the README badge
  # stays stuck on whatever the last *uncancelled* run reported.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gates:
    name: gates / ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Matrix kept intentionally small: agentline ships pure JavaScript
        # with no native modules. macos-13 (Intel) is omitted because GitHub
        # is winding down its Intel-mac pool; ubuntu-22.04 is omitted because
        # 24.04 is the current LTS and the bash/coreutils skew between them
        # has not produced a real bug for this codebase. Re-add either if a
        # native dependency lands or a bash-skew regression appears.
        os: [macos-14, ubuntu-24.04, windows-2022]
        node: [20, 22]
    defaults:
      run:
        # Git Bash on Windows; default bash everywhere else.
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install shellcheck (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install shellcheck (windows)
        if: runner.os == 'Windows'
        # Runs in PowerShell: the bash step's `tar` is Git for Windows' GNU tar,
        # which treats the drive-letter colon as a remote host and cannot read
        # .zip archives. `Expand-Archive` handles the zip natively.
        #
        # Windows runners don't ship shellcheck. `choco install` is not treated
        # as pinned by OpenSSF Scorecard's Pinned-Dependencies check, so fetch a
        # fixed release by URL and verify its SHA-256 before use — a verified
        # download is pinned and not flagged. A SHA-256 mismatch fails loudly
        # (tampering); a download miss is best-effort and leaves shellcheck off
        # PATH so gate-03 marks itself skipped, keeping the workflow honest
        # about coverage.
        shell: pwsh
        env:
          SHELLCHECK_VERSION: "0.11.0"
          SHELLCHECK_SHA256: "8a4e35ab0b331c85d73567b12f2a444df187f483e5079ceffa6bda1faa2e740e"
        run: |
          if (Get-Command shellcheck -ErrorAction SilentlyContinue) { exit 0 }
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/koalaman/shellcheck/releases/download/v$env:SHELLCHECK_VERSION/shellcheck-v$env:SHELLCHECK_VERSION.zip"
          $work = Join-Path $env:RUNNER_TEMP 'shellcheck'
          $bin = Join-Path $work 'bin'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $zip = Join-Path $work 'shellcheck.zip'
          try {
            Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          } catch {
            Write-Output "::warning::shellcheck download failed; gate-03 will skip on Windows"
            exit 0
          }
          $actual = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $env:SHELLCHECK_SHA256) {
            Write-Output "::error::shellcheck.zip SHA-256 mismatch — refusing to install"
            exit 1
          }
          Expand-Archive -LiteralPath $zip -DestinationPath $work -Force
          $exe = Get-ChildItem -Path $work -Recurse -Filter 'shellcheck*.exe' | Select-Object -First 1
          if (-not $exe) {
            Write-Output "::warning::shellcheck binary not found in archive; gate-03 will skip"
            exit 0
          }
          Copy-Item -Path $exe.FullName -Destination (Join-Path $bin 'shellcheck.exe') -Force
          Add-Content -Path $env:GITHUB_PATH -Value $bin

      - name: Install dependencies (pnpm)
        # gate-01 invokes scripts/doctor.sh which needs a runnable bin.
        # corepack ships with Node ≥20 and pins pnpm via package.json's
        # `packageManager` field. `--frozen-lockfile` fails loudly if
        # pnpm-lock.yaml drifts — the reproducibility we want in CI.
        if: hashFiles('package.json') != ''
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build agentline bin
        # `dist/cli.mjs` is the runnable artefact gate-01's wrapper resolves
        # before falling back to `npx`. Skip cleanly when there is no
        # `package.json` (very early bootstrap commits).
        if: hashFiles('package.json') != ''
        run: pnpm run build

      - name: Run unit tests (vitest)
        # Runs colocated Vitest tests + tests/integration/. Roughly ~30s
        # wall-clock on a CI runner; legs run in parallel, so this adds
        # negligible time to the slowest matrix leg. Failures here block
        # gates the same way a gate failure does — both must pass.
        if: hashFiles('package.json') != '' && !(matrix.os == 'ubuntu-24.04' && matrix.node == 22)
        run: pnpm test

      - name: Run unit tests with coverage (single leg)
        # Coverage runs on exactly one matrix leg — running it on every
        # leg is wasteful, and the report is a stable property of the
        # suite, not the host. Thresholds are configured in
        # vitest.config.ts; this step exits non-zero if they regress.
        if: hashFiles('package.json') != '' && matrix.os == 'ubuntu-24.04' && matrix.node == 22
        run: pnpm test --coverage

      - name: Upload coverage report
        # Uploaded only from the coverage leg. lcov.info is the
        # machine-readable file Codecov/Sonar/etc. consume; the html/
        # tree is useful for ad-hoc inspection by reviewers.
        if: hashFiles('package.json') != '' && matrix.os == 'ubuntu-24.04' && matrix.node == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Run gates
        run: bash tests/gates/run-all.sh

      - name: Upload gate artefacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gates-${{ matrix.os }}-node${{ matrix.node }}-${{ github.run_id }}
          path: tests/gates/.tmp/
          if-no-files-found: warn
          retention-days: 14
